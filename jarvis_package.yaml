name: "apple"
display_name: "Apple TV & HomePod"
description: "Apple TV and HomePod control via AirPlay/Companion protocol. Discover and control Apple media players on your LAN."
version: "1.0.0"
min_jarvis_version: "0.9.0"
license: "MIT"
author:
  github: "alexberardi"
categories: ["smart-home", "media"]
platforms: ["darwin", "linux"]
keywords: ["apple", "apple tv", "homepod", "airplay", "media player"]

components:
  - type: device_protocol
    name: apple
    path: device_families/apple/protocol.py

packages: []
# pyatv has native dependencies (C++ compiler) and is installed on the node
# at runtime, not during Pantry container testing. The protocol handles
# ImportError gracefully.

secrets:
  - key: LAN_SUBNET
    scope: node
    value_type: string
    description: "LAN subnet prefix for device discovery in Docker (e.g. 10.0.0). Not needed on Pi nodes."
    is_sensitive: false
    required: false
    friendly_name: "LAN Subnet"
